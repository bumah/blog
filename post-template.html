<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <!-- REQUIRED: the post's title. Shows as the heading and the homepage link. -->
  <meta name="title" content="PUT YOUR TITLE HERE">

  <!-- OPTIONAL: comma-separated tags. Delete this line if you don't want tags. -->
  <meta name="tags" content="reflection">

  <!-- OPTIONAL: one sentence shown under the title on the homepage. -->
  <meta name="description" content="A one-line summary of this reflection.">

  <title>PUT YOUR TITLE HERE</title>
</head>
<body>
  <!-- Write your reflection below. Use normal HTML: -->
  <p>Your opening paragraph goes here.</p>

  <h2>A section heading (optional)</h2>
  <p>More writing. You can use <strong>bold</strong>, <em>italics</em>,
  and <a href="https://example.com">links</a>.</p>

  <blockquote>A quote, if you want one.</blockquote>
</body>
</html>
